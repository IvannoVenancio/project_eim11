
services:
  app:
    build:
     context: ./
     dockerfile: Dockerfile
    container_name: app_eim11
    volumes:
      - ./:/home/app
    ports:
     - 3000:3000
    networks:
     - app_network

    
  mysqldb:
    image: mysql:8.0.21
    container_name: app_db
    platform: linux/amd64
    env_file:
      - ./.env
    ports:
      - 3306:3306
    volumes:
      - app_volume_db:/var/lib/mysql
    networks:
      - app_network
    
networks:
 app_network:
   driver: bridge

volumes:
 app_volume_db: {}

  